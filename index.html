<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Sourcing Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F3EFE4;
    --paper-2: #ECE5D3;
    --navy: #1F3A5F;
    --rust: #A1462E;
    --ink: #2A2620;
    --ink-soft: #6B6356;
    --line: #C9BFA8;
    --gold: #B8860B;
    --green: #3E5C3A;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 3px);
    color: var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
  }
  .wrap{ max-width: 760px; margin:0 auto; padding: 28px 18px 80px; }

  .masthead{
    text-align:center;
    border-bottom: 3px double var(--navy);
    padding-bottom: 16px;
    margin-bottom: 18px;
  }
  .masthead .kicker{
    font-family:'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--rust);
    text-transform: uppercase;
  }
  .masthead h1{
    font-family:'Special Elite', monospace;
    font-size: 28px;
    margin: 6px 0 4px;
    color: var(--navy);
    letter-spacing: 1px;
  }
  .tagline{
    text-align:center;
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 20px;
    font-style: italic;
  }

  .tabs{
    display:flex;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }
  .tab{
    font-family:'Special Elite', monospace;
    background:none;
    border:none;
    padding: 10px 4px;
    margin-right: 22px;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
    cursor:pointer;
    position:relative;
    top:1px;
  }
  .tab.active{ color: var(--navy); border-bottom: 2px solid var(--rust); }
  .tab:hover{ color: var(--navy); }
  .tab:focus-visible{ outline: 2px solid var(--navy); outline-offset: 2px; }

  .loading{ text-align:center; padding: 60px 0; color: var(--ink-soft); font-family:'Special Elite', monospace; }

  /* category card */
  .lane{
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow:hidden;
  }
  .lane-head{
    display:flex;
    align-items:baseline;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    background: rgba(31,58,95,0.04);
  }
  .lane-num{
    font-family:'Special Elite', monospace;
    color: var(--rust);
    font-size: 13px;
  }
  .lane-title{
    font-family:'Special Elite', monospace;
    font-size: 15px;
    color: var(--navy);
    flex: 1;
  }
  .lane-sub{
    font-size: 11px;
    color: var(--ink-soft);
    width:100%;
    margin-top: 2px;
  }
  .lane-progress{
    font-family:'Courier Prime', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .lane-body{ padding: 6px 14px 10px; }

  .item{
    display:flex;
    align-items:flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px dashed var(--line);
    cursor:pointer;
  }
  .item:last-child{ border-bottom:none; }
  .item input[type=checkbox]{
    margin-top: 3px;
    width: 16px; height:16px;
    accent-color: var(--green);
    flex-shrink:0;
  }
  .item label{
    font-size: 13.5px;
    line-height: 1.5;
    cursor:pointer;
  }
  .item.checked label{
    color: var(--ink-soft);
    text-decoration: line-through;
    text-decoration-color: var(--rust);
  }
  .item a{ color: var(--navy); text-decoration: underline; text-decoration-color: var(--line); }
  .item a:hover{ text-decoration-color: var(--navy); }
  .src-tag{
    display:inline-block;
    font-family:'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing:0.5px;
    padding: 1px 5px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: 1px;
  }
  .src-fl{ background: rgba(161,70,46,0.12); color: var(--rust); }
  .src-mo{ background: rgba(31,58,95,0.12); color: var(--navy); }

  .footer-bar{
    margin-top: 22px;
    display:flex;
    justify-content: space-between;
    align-items:center;
    flex-wrap:wrap;
    gap: 10px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .session-count{
    font-family:'Courier Prime', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .session-count b{ color: var(--navy); }
  .reset-btn{
    font-family:'IBM Plex Sans', sans-serif;
    font-size: 12px;
    background:none;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 6px 12px;
    border-radius: 3px;
    cursor:pointer;
  }
  .reset-btn:hover{ border-color: var(--rust); color: var(--rust); }

  /* deal tracker */
  .deal-toolbar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom: 16px; flex-wrap:wrap; gap:10px;
  }
  .deal-summary{ font-size: 12.5px; color: var(--ink-soft); line-height:1.5; }
  .deal-summary strong{ font-family:'Courier Prime', monospace; color: var(--navy); }
  .add-btn{
    font-family:'Special Elite', monospace;
    font-size: 12.5px;
    background: var(--navy);
    color: var(--paper);
    border:none;
    padding: 9px 16px;
    border-radius: 3px;
    cursor:pointer;
    letter-spacing: 0.5px;
  }
  .add-btn:hover{ background: #16304f; }

  .deal-card{
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .deal-card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap: 8px;
    padding-right: 22px;
  }
  .deal-x{
    position: absolute;
    top: 8px;
    right: 10px;
    width: 22px;
    height: 22px;
    border: none;
    background: none;
    color: var(--ink-soft);
    font-family:'Courier Prime', monospace;
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    border-radius: 50%;
  }
  .deal-x:hover{ color: var(--paper); background: var(--rust); }
  .deal-x:focus-visible{ outline: 2px solid var(--navy); outline-offset: 1px; }
  .deal-addr{ font-family:'Special Elite', monospace; font-size: 14px; color: var(--ink); }
  .badge{
    font-family:'Courier Prime', monospace;
    font-size: 10.5px;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .badge-pin{ background: rgba(62,92,58,0.15); color: var(--green); }
  .badge-pass{ background: rgba(161,70,46,0.15); color: var(--rust); }
  .badge-research{ background: rgba(184,134,11,0.15); color: var(--gold); }
  .badge-auction{ background: rgba(31,58,95,0.15); color: var(--navy); }

  .badge-verifying{ background: rgba(184,134,11,0.15); color: var(--gold); }
  .badge-confirmed{ background: rgba(62,92,58,0.15); color: var(--green); }
  .badge-ruledout{ background: rgba(161,70,46,0.15); color: var(--rust); }
  .badge-contacted{ background: rgba(31,58,95,0.15); color: var(--navy); }

  .badge-active{ background: rgba(62,92,58,0.15); color: var(--green); }
  .badge-secondary{ background: rgba(184,134,11,0.15); color: var(--gold); }
  .badge-cold{ background: rgba(107,99,86,0.15); color: var(--ink-soft); }

  .followup-pill{
    display:inline-flex; align-items:center; gap:4px;
    font-family:'Courier Prime', monospace; font-size: 10.5px;
    padding: 2px 8px; border-radius: 10px; margin-left: 6px;
  }
  .followup-overdue{ background: rgba(161,70,46,0.18); color: var(--rust); }
  .followup-soon{ background: rgba(184,134,11,0.18); color: var(--gold); }
  .followup-ok{ background: rgba(62,92,58,0.12); color: var(--green); }
  .followup-none{ background: rgba(107,99,86,0.1); color: var(--ink-soft); }

  .score-dots{ display:inline-flex; gap: 3px; vertical-align: middle; }
  .score-dot{ width:8px; height:8px; border-radius:50%; background: var(--line); display:inline-block; }
  .score-dot.filled{ background: var(--green); }

  .contact-links{ display:flex; gap: 14px; margin: 4px 0 8px; }
  .contact-links a{ font-size: 12px; color: var(--navy); text-decoration: none; font-family:'Courier Prime', monospace; }
  .contact-links a:hover{ text-decoration: underline; }

  .filter-bar{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .filter-chip{
    font-family:'Courier Prime', monospace; font-size: 11.5px;
    background: none; border: 1px solid var(--line); color: var(--ink-soft);
    padding: 5px 12px; border-radius: 14px; cursor:pointer;
  }
  .filter-chip.active{ background: var(--navy); color: var(--paper); border-color: var(--navy); }

  .buybox-line{ font-size: 12px; color: var(--ink-soft); margin: 4px 0; line-height:1.5; }
  .log-entries{ margin-top: 8px; border-top: 1px dashed var(--line); padding-top: 6px; }
  .log-entry{ font-size: 11.5px; color: var(--ink-soft); margin-bottom: 3px; }
  .log-entry b{ color: var(--ink); font-family:'Courier Prime', monospace; font-weight:normal; }

  .juris-tag{
    display:inline-block;
    font-family:'Courier Prime', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .step-list{ margin: 10px 0 4px; }
  .step-row{
    display:flex;
    align-items:flex-start;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--line);
  }
  .step-row:last-child{ border-bottom:none; }
  .step-row input[type=checkbox]{
    margin-top: 3px;
    width: 15px; height:15px;
    accent-color: var(--green);
    flex-shrink:0;
  }
  .step-row .step-text{ font-size: 12.5px; line-height:1.45; }
  .step-row .step-text a{ color: var(--navy); text-decoration: underline; text-decoration-color: var(--line); font-size: 11px; }
  .step-row.done .step-text b{ color: var(--ink-soft); text-decoration: line-through; text-decoration-color: var(--rust); }

  .deal-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px 14px;
    margin: 10px 0 6px;
    font-family:'Courier Prime', monospace;
    font-size: 12px;
  }
  .deal-grid div span{ display:block; color: var(--ink-soft); font-size: 10px; text-transform:uppercase; }
  .deal-next{ font-size: 12.5px; margin-top: 6px; color: var(--ink); }
  .deal-next b{ color: var(--rust); }
  .deal-actions{ margin-top: 8px; display:flex; gap: 10px; }
  .link-btn{
    font-size: 11.5px;
    background:none; border:none; color: var(--ink-soft);
    cursor:pointer; text-decoration: underline;
    padding:0;
  }
  .link-btn:hover{ color: var(--navy); }
  .link-btn.danger:hover{ color: var(--rust); }

  .empty{
    text-align:center;
    padding: 40px 16px;
    color: var(--ink-soft);
    font-size: 13px;
    border: 1px dashed var(--line);
    border-radius: 2px;
  }

  /* modal form */
  .modal-backdrop{
    position:fixed; inset:0; background: rgba(20,18,14,0.5);
    display:flex; align-items:flex-end; justify-content:center;
    z-index: 50;
  }
  .modal{
    background: var(--paper);
    width:100%; max-width: 480px;
    border-radius: 8px 8px 0 0;
    padding: 20px 18px 24px;
    max-height: 88vh; overflow-y:auto;
  }
  @media (min-width: 540px){
    .modal-backdrop{ align-items:center; }
    .modal{ border-radius: 6px; }
  }
  .modal h3{ font-family:'Special Elite', monospace; color: var(--navy); margin: 0 0 14px; font-size: 16px; }
  .field{ margin-bottom: 12px; }
  .field label{ display:block; font-size: 11px; color: var(--ink-soft); text-transform:uppercase; margin-bottom: 4px; letter-spacing:0.5px; }
  .field input, .field select, .field textarea{
    width:100%;
    font-family:'IBM Plex Sans', sans-serif;
    font-size: 13.5px;
    padding: 8px 9px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: #fff;
    color: var(--ink);
  }
  .field textarea{ resize: vertical; min-height: 50px; }
  .paste-box{
    background: rgba(31,58,95,0.06);
    border: 1px dashed var(--navy);
    border-radius: 4px;
    padding: 10px 10px 12px;
    margin-bottom: 16px;
  }
  .paste-box label{ color: var(--navy); }
  .paste-box textarea{ min-height: 70px; font-family:'Courier Prime', monospace; font-size: 12.5px; }
  .row2{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap: 10px; margin-top: 16px; }
  .btn-secondary{
    background:none; border:1px solid var(--line); color: var(--ink-soft);
    padding: 9px 16px; border-radius: 3px; cursor:pointer; font-size: 12.5px;
  }
  .btn-primary{
    background: var(--green); color: #fff; border:none;
    padding: 9px 16px; border-radius: 3px; cursor:pointer; font-size: 12.5px; font-family:'Special Elite', monospace;
  }

  .overlay{
    position: fixed; inset:0; display:none; align-items:center; justify-content:center;
    background: rgba(20,18,14,0.35); z-index: 60;
  }
  .overlay.show{ display:flex; }
  .big-stamp{
    font-family:'Special Elite', monospace;
    font-size: 30px;
    color: var(--rust);
    border: 4px solid var(--rust);
    padding: 14px 26px;
    transform: rotate(-6deg);
    border-radius: 6px;
    background: rgba(243,239,228,0.95);
    text-align:center;
  }
  .big-stamp small{ display:block; font-size: 11px; color: var(--ink-soft); margin-top: 4px; letter-spacing:1px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="kicker">Jerry — Real Estate Sourcing</div>
    <h1>Daily Sourcing Log</h1>
  </div>
  <p class="tagline">Run this every morning before you touch anything else. Four lanes, no exceptions.</p>
  <p style="text-align:center; font-family:'Courier Prime',monospace; font-size:11px; margin:-12px 0 18px; color:var(--ink-soft);">
    <span id="syncStatus">Connecting…</span>
  </p>

  <div class="tabs" role="tablist">
    <button class="tab active" id="tabLogBtn" role="tab" aria-selected="true" type="button">Sourcing Log</button>
    <button class="tab" id="tabDealsBtn" role="tab" aria-selected="false" type="button">Deal Tracker</button>
    <button class="tab" id="tabDocketBtn" role="tab" aria-selected="false" type="button">Unprobated Docket</button>
    <button class="tab" id="tabBuyersBtn" role="tab" aria-selected="false" type="button">Buyer Contacts</button>
  </div>

  <div id="app"><div class="loading">Loading your log…</div></div>
  <div id="dealApp" style="display:none;"><div class="loading">Loading your deals…</div></div>
  <div id="docketApp" style="display:none;"><div class="loading">Loading your docket…</div></div>
  <div id="buyersApp" style="display:none;"><div class="loading">Loading your buyer list…</div></div>
</div>

<div class="overlay" id="overlay">
  <div class="big-stamp">LOGGED ✓<small id="stampDate"></small></div>
</div>

<script>
(function(){
  const categories = [
    { id: 'fsbo',  number: '01', title: 'FSBO Sweep',           sub: 'Owner-listed properties, no agent in the middle' },
    { id: 'dist',  number: '02', title: 'Distress Lists',       sub: 'County & court records on sellers already under pressure — FL and MO' },
    { id: 'boots', number: '03', title: 'Boots on the Ground',  sub: 'Eyes on the street — you or your field contact' },
    { id: 'out',   number: '04', title: 'Outreach & Follow-Up', sub: "Turn today's list into tomorrow's contract" },
  ];

  const items = [
    { id:'fsbo-1', cat:'fsbo', html:"Scan Zillow's FSBO filter for new listings in your target zips" },
    { id:'fsbo-2', cat:'fsbo', html:'Check Facebook Marketplace and local groups for "must sell" posts' },
    { id:'fsbo-3', cat:'fsbo', html:'Check FSBO.com and Craigslist for new owner-listed posts' },
    { id:'fsbo-4', cat:'fsbo', html:'Flag anything with motivated language — as-is, must sell, no agents' },

    { id:'dist-1', cat:'dist', html:'<span class="src-tag src-fl">FL</span>Pull new probate filings on <a href="https://www.floridapublicnotices.com/" target="_blank" rel="noopener">floridapublicnotices.com</a> — filter keyword "Probate Division"' },
    { id:'dist-2', cat:'dist', html:'<span class="src-tag src-fl">FL</span>Check the Ocala Star-Banner for new Notice to Creditors publications' },
    { id:'dist-3', cat:'dist', html:'<span class="src-tag src-fl">FL</span>Check Marion County Tax Collector for new tax deed / delinquent listings — reach owners pre-auction' },
    { id:'dist-4', cat:'dist', html:'<span class="src-tag src-mo">MO</span>Search <a href="https://www.courts.mo.gov/casenet/" target="_blank" rel="noopener">Case.net</a> — case type "Probate," county "Boone," filtered by recent filing date' },
    { id:'dist-5', cat:'dist', html:'<span class="src-tag src-mo">MO</span>Check Columbia Missourian legal notices for Boone County Probate Division filings' },
    { id:'dist-6', cat:'dist', html:'<span class="src-tag src-mo">MO</span>Check <a href="https://www.boonemo.gov/collector/real-estate-tax/delinquent.asp" target="_blank" rel="noopener">Boone County Collector</a> delinquent tax certificate list (published ~3 weeks before the August sale)' },
    { id:'dist-7', cat:'dist', html:'Pull newly expired or withdrawn MLS listings in either target area' },

    { id:'boots-1', cat:'boots', html:'Drive one new target neighborhood — or send your field contact' },
    { id:'boots-2', cat:'boots', html:'Log the address of every vacant or distressed-looking house' },
    { id:'boots-3', cat:'boots', html:'Snap a photo of anything worth a second look' },
    { id:'boots-4', cat:'boots', html:"Send today's finds to, or get them from, your field contact" },

    { id:'out-1', cat:'out', html:'Mail or call every new lead pulled from today\'s Distress Lists pass' },
    { id:'out-2', cat:'out', html:'Follow up with anyone from the last 3 days who hasn\'t responded' },
    { id:'out-3', cat:'out', html:'Update the Deal Tracker with today\'s status changes' },
    { id:'out-4', cat:'out', html:'Text or call one cash buyer to keep the relationship warm' },
  ];

  const sampleDeals = [
    { id:'d1', address:'1002 W Silver Springs Pl', city:'Ocala, FL', status:'pin', asking:'100000', arv:'150000', maxOffer:'60000', next:'Negotiate owner down to $55K–$65K; verify zoning on former duplex configuration' },
    { id:'d2', address:'2419 NE 29th Ter', city:'Ocala, FL', status:'research', asking:'', arv:'280000', maxOffer:'170000', next:'Verify roof and HVAC age before firming up offer' },
    { id:'d3', address:'10875 SW 79th Ave', city:'Ocala, FL (Palm Cay 55+)', status:'research', asking:'', arv:'165000', maxOffer:'88000', next:'Confirm pre-foreclosure case status, reach heir Kayla Hanley-Fernicola' },
    { id:'d4', address:'5144 SW 181st Ct', city:'Dunnellon, FL', status:'research', asking:'', arv:'142000', maxOffer:'68000', next:'Well/septic verification; out-of-county attorney is a motivation signal — contact PR Luana Powell' },
  ];

  // ---------- Supabase config ----------
  const SUPABASE_URL = 'https://mvmddsugxtiozjhdzpvi.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bWRkc3VneHRpb3pqaGR6cHZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTM5NzMsImV4cCI6MjA5ODQyOTk3M30.3oXxlnInMuE_tAXt8eUlFDa0qTL80OCP109q3tTaE1I';
  const REST_URL = SUPABASE_URL + '/rest/v1/app_data';

  function setSyncStatus(state){
    const el = document.getElementById('syncStatus');
    if (!el) return;
    const map = {
      ok:      { text: 'Synced',      color: 'var(--green)' },
      saving:  { text: 'Saving…',     color: 'var(--gold)' },
      error:   { text: 'Offline — saved locally', color: 'var(--rust)' },
    };
    const s = map[state] || map.ok;
    el.textContent = s.text;
    el.style.color = s.color;
  }

  // ---------- storage helpers (Supabase, with localStorage fallback) ----------
  async function storeGet(key){
    try{
      const res = await fetch(`${REST_URL}?key=eq.${encodeURIComponent(key)}&select=value`, {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        }
      });
      if (!res.ok) throw new Error('fetch failed');
      const rows = await res.json();
      setSyncStatus('ok');
      if (rows && rows.length){
        localStorage.setItem(key, JSON.stringify(rows[0].value));
        return rows[0].value;
      }
      return null;
    }catch(e){
      setSyncStatus('error');
      try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }catch(e2){ return null; }
    }
  }
  async function storeSet(key, value){
    try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
    try{
      setSyncStatus('saving');
      const res = await fetch(REST_URL, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'resolution=merge-duplicates',
        },
        body: JSON.stringify([{ key, value, updated_at: new Date().toISOString() }])
      });

      setSyncStatus('ok');

  function renderLog(){

    let html = '';
    categories.forEach(cat => {

      const checkedCount = catItems.filter(i => checkedState[i.id]).length;
      html += `<div class="lane">
        <div class="lane-head">
          <span class="lane-num">${cat.number}</span>
          <span class="lane-title">${cat.title}</span>
          <span class="lane-progress">${checkedCount}/${catItems.length}</span>
          <div class="lane-sub">${cat.sub}</div>
        </div>
        <div class="lane-body">`;
      catItems.forEach(item => {
        const checked = !!checkedState[item.id];
        html += `<div class="item ${checked?'checked':''}" data-id="${item.id}">
          <input type="checkbox" id="cb-${item.id}" ${checked?'checked':''} />
          <label for="cb-${item.id}">${item.html}</label>
        </div>`;
      });
      html += `</div></div>`;
    });

    const totalChecked = items.filter(i => checkedState[i.id]).length;
    html += `<div class="footer-bar">
      <div class="session-count">Today: <b>${totalChecked}/${items.length}</b> &nbsp;|&nbsp; Sessions logged: <b>${sessionsLogged}</b></div>
      <button class="reset-btn" id="resetBtn" type="button">Reset today</button>
    </div>`;

    app.innerHTML = html;

    app.querySelectorAll('.item').forEach(el => {
      el.addEventListener('click', async (e) => {
        if (e.target.tagName === 'A') return;
        const id = el.getAttribute('data-id');
        const wasAllDone = items.every(i => checkedState[i.id]);
        checkedState[id] = !checkedState[id];
        await storeSet('sourcing-log-' + todayKey(), checkedState);
        const nowAllDone = items.every(i => checkedState[i.id]);
        if (!wasAllDone && nowAllDone){
          sessionsLogged += 1;
          await storeSet('sourcing-sessions-count', sessionsLogged);
          showStamp();
        }
        renderLog();
      });
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
      checkedState = {};
      await storeSet('sourcing-log-' + todayKey(), checkedState);

  }

  function statusLabel(s){

  function fmtMoney(v){
    if (!v) return '—';
    const n = Number(v);
    if (isNaN(n)) return v;
    return '$' + n.toLocaleString();
  }
  function fmtNum(v){
    if (!v) return '—';
    const n = Number(v);
    if (isNaN(n)) return v;
    return n.toLocaleString();
  }

  function parseListing(text){
    const out = { address:'', city:'', asking:'', sqft:'', beds:'', baths:'', pricePerSqft:'' };
    if (!text) return out;

    // price + price/sqft — find all $ amounts, separate any that are followed by "/sqft" or "/sq ft"
    const priceMatches = [...text.matchAll(/\$\s?[\d,]+(?:\.\d+)?/g)];
    for (const m of priceMatches){
      const tail = text.slice(m.index + m[0].length, m.index + m[0].length + 12);
      const clean = m[0].replace(/[$,\s]/g,'');
      if (/^\s*\/\s*(sq\.?\s*ft|sqft)/i.test(tail)){
        if (!out.pricePerSqft) out.pricePerSqft = clean;
      } else if (!out.asking){
        out.asking = clean;
      }
    }

    // sqft
    const sqftMatch = text.match(/([\d,]{3,7})\s*(?:sq\.?\s*ft|sqft|square feet)/i);
    if (sqftMatch) out.sqft = sqftMatch[1].replace(/,/g,'');

    // beds
    const bedMatch = text.match(/(\d+(?:\.\d)?)\s*(?:bds?\.?|beds?\.?|bedrooms?)/i);
    if (bedMatch) out.beds = bedMatch[1];

    // baths
    const bathMatch = text.match(/(\d+(?:\.\d)?)\s*(?:bas?\.?|baths?\.?|bathrooms?)/i);
    if (bathMatch) out.baths = bathMatch[1];

    // address — street number + street name, city, ST ZIP
    const addrMatch = text.match(/\d{1,6}\s+[A-Za-z0-9.#'\- ]+,\s*[A-Za-z .'\-]+,\s*[A-Z]{2}\s*\d{5}/);
    if (addrMatch){
      const parts = addrMatch[0].split(',');
      out.address = parts[0].trim();
      out.city = parts.slice(1).join(',').trim();
    } else {
      // fallback: first line that starts with a number (street address without city/state)
      const line = text.split('\n').map(l => l.trim()).find(l => /^\d{1,6}\s+\S/.test(l) && !/\$/.test(l));
      if (line) out.address = line;
    }

    // derive price/sqft if not explicitly found but we have both price and sqft
    if (!out.pricePerSqft && out.asking && out.sqft){
      const ppsf = Number(out.asking) / Number(out.sqft);
      if (isFinite(ppsf)) out.pricePerSqft = ppsf.toFixed(0);
    }

    return out;
  }

        </div>
        <div class="row2">
          <div class="field"><label>Sqft</label><input id="f-sqft" type="number" value="${d.sqft||''}" /></div>
          <div class="field"><label>$ / Sqft</label><input id="f-ppsf" type="number" value="${d.pricePerSqft||''}" /></div>

        <div class="modal-actions">

          <button class="btn-primary" id="saveModal" type="button">${id ? 'Save Changes' : 'Add Property'}</button>
        </div>
      </div>`;
    document.body.appendChild(backdrop);

    function recalcMaxOffer(){
      const arv = parseFloat(document.getElementById('f-arv').value);
      const repairs = parseFloat(document.getElementById('f-repairs').value) || 0;
      const maxOfferField = document.getElementById('f-maxoffer');
      if (!isNaN(arv) && arv > 0){
        const calc = Math.round(arv * 0.7 - repairs);
        maxOfferField.value = calc;
      }
    }
    document.getElementById('f-arv').addEventListener('input', recalcMaxOffer);
    document.getElementById('f-repairs').addEventListener('input', recalcMaxOffer);

    document.getElementById('parseBtn').addEventListener('click', () => {
      const raw = document.getElementById('f-paste').value;
      const parsed = parseListing(raw);
      if (parsed.address) document.getElementById('f-address').value = parsed.address;
      if (parsed.city) document.getElementById('f-city').value = parsed.city;
      if (parsed.asking) document.getElementById('f-asking').value = parsed.asking;
      if (parsed.sqft) document.getElementById('f-sqft').value = parsed.sqft;
      if (parsed.beds) document.getElementById('f-beds').value = parsed.beds;
      if (parsed.baths) document.getElementById('f-baths').value = parsed.baths;
      if (parsed.pricePerSqft) document.getElementById('f-ppsf').value = parsed.pricePerSqft;
      const gotAnything = parsed.address || parsed.asking || parsed.sqft || parsed.beds || parsed.baths;
      const btn = document.getElementById('parseBtn');
      btn.textContent = gotAnything ? '✓ Filled — check the fields below' : 'Couldn\'t find those details — fill in manually';

    });

    document.getElementById('lookupBtn').addEventListener('click', async () => {
      const addr = document.getElementById('f-address').value.trim();
      const city = document.getElementById('f-city').value.trim();
      const resultEl = document.getElementById('lookupResult');
      const btn = document.getElementById('lookupBtn');
      if (!addr){
        resultEl.style.color = 'var(--rust)';
        resultEl.textContent = 'Enter an address first.';
        return;
      }
      const fullAddress = city ? `${addr}, ${city}` : addr;
      btn.textContent = 'Looking up…';
      btn.disabled = true;
      resultEl.style.color = 'var(--ink-soft)';
      resultEl.textContent = '';
      try{
        const res = await fetch(`${SUPABASE_URL}/functions/v1/rentcast-comps`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            apikey: SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ address: fullAddress }),
        });
        const data = await res.json();
        if (!res.ok || data.error){
          resultEl.style.color = 'var(--rust)';
          resultEl.textContent = 'No estimate found — ' + (data.error || 'check the address and try again.');
        } else if (data.price){
          document.getElementById('f-arv').value = Math.round(data.price);
          recalcMaxOffer();
          const low = data.priceRangeLow ? fmtMoney(data.priceRangeLow) : '—';
          const high = data.priceRangeHigh ? fmtMoney(data.priceRangeHigh) : '—';
          const compCount = Array.isArray(data.comparables) ? data.comparables.length : 0;
          resultEl.style.color = 'var(--green)';
          resultEl.textContent = `Estimate: ${fmtMoney(data.price)} (range ${low}–${high}) based on ${compCount} comps. ARV field filled — verify against your own comps before relying on it.`;
        } else {
          resultEl.style.color = 'var(--rust)';
          resultEl.textContent = 'No estimate returned for that address — check spelling/formatting or fill ARV in manually.';
        }
      }catch(e){
        resultEl.style.color = 'var(--rust)';
        resultEl.textContent = 'Lookup failed — check your connection and try again.';
      }
      btn.textContent = 'Look Up Value Estimate (RentCast)';
      btn.disabled = false;
    });

    document.getElementById('cancelModal').addEventListener('click', closeDealModal);
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeDealModal(); });
    document.getElementById('saveModal').addEventListener('click', async () => {
      const address = document.getElementById('f-address').value.trim();
      if (!address){ document.getElementById('f-address').focus(); return; }
      const payload = {
        id: id || ('d' + Date.now()),
        address,
        city: document.getElementById('f-city').value.trim(),
        status: document.getElementById('f-status').value,
        asking: document.getElementById('f-asking').value,
        arv: document.getElementById('f-arv').value,
        repairs: document.getElementById('f-repairs').value,
        maxOffer: document.getElementById('f-maxoffer').value,
        sqft: document.getElementById('f-sqft').value,
        pricePerSqft: document.getElementById('f-ppsf').value,
        beds: document.getElementById('f-beds').value,
        baths: document.getElementById('f-baths').value,
        next: document.getElementById('f-next').value.trim(),
      };
      if (id){
        deals = deals.map(x => x.id === id ? payload : x);
      } else {
        deals.push(payload);
      }
      await storeSet('deal-tracker', deals);
      closeDealModal();
      renderDeals();
    });
  }

  }

  function openCaseModal(id){
    const c = id ? caseFiles.find(x => x.id === id) : { decedentName:'', jurisdiction:'marion', address:'', status:'verifying', next:'', steps:{} };
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.id = 'caseModalBackdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h3>${id ? 'Edit Case File' : 'Add Case File'}</h3>
        <div class="field"><label>Decedent Name</label><input id="c-name" value="${c.decedentName||''}" /></div>
        <div class="field">
          <label>Jurisdiction</label>
          <select id="c-juris">
            <option value="marion" ${c.jurisdiction==='marion'?'selected':''}>Marion County, FL</option>
            <option value="boone" ${c.jurisdiction==='boone'?'selected':''}>Boone County, MO</option>
          </select>
        </div>
        <div class="field"><label>Property Address (if known)</label><input id="c-address" value="${c.address||''}" /></div>
        <div class="field">
          <label>Status</label>
          <select id="c-status">
            <option value="verifying" ${c.status==='verifying'?'selected':''}>Verifying</option>
            <option value="confirmed" ${c.status==='confirmed'?'selected':''}>Confirmed Unprobated</option>
            <option value="contacted" ${c.status==='contacted'?'selected':''}>Contacted</option>
            <option value="ruledout" ${c.status==='ruledout'?'selected':''}>Ruled Out</option>
          </select>
        </div>
        <div class="field"><label>Next Action</label><textarea id="c-next">${c.next||''}</textarea></div>
        <div class="modal-actions">
          <button class="btn-secondary" id="cancelCaseModal" type="button">Cancel</button>
          <button class="btn-primary" id="saveCaseModal" type="button">${id ? 'Save Changes' : 'Add Case File'}</button>
        </div>
      </div>`;
    document.body.appendChild(backdrop);

    document.getElementById('cancelCaseModal').addEventListener('click', closeCaseModal);
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeCaseModal(); });
    document.getElementById('saveCaseModal').addEventListener('click', async () => {
      const decedentName = document.getElementById('c-name').value.trim();
      if (!decedentName){ document.getElementById('c-name').focus(); return; }
      const payload = {
        id: id || ('c' + Date.now()),
        decedentName,
        jurisdiction: document.getElementById('c-juris').value,
        address: document.getElementById('c-address').value.trim(),
        status: document.getElementById('c-status').value,
        next: document.getElementById('c-next').value.trim(),
        steps: c.steps || {},
      };
      if (id){
        caseFiles = caseFiles.map(x => x.id === id ? payload : x);
      } else {
        caseFiles.push(payload);
      }
      await storeSet('unprobated-docket', caseFiles);
      closeCaseModal();
      renderDocket();
    });
  }

  function closeCaseModal(){
    const el = document.getElementById('caseModalBackdrop');
    if (el) el.remove();
  }

  // ---------- buyer contacts ----------
  const VETTING_CHECKS = [
    { key:'pof', label:'Proof of funds received & verifiable' },
    { key:'closingSpeed', label:'Specific, confident closing timeline' },
    { key:'assignmentClear', label:'Clear yes/no on assignment vs. double-close' },
    { key:'noDefensive', label:'No defensiveness on the re-trade question' },
    { key:'references', label:'Provided references without hesitation' },
    { key:'responsive', label:'Responsive — same-day reply' },
  ];

  let buyers = [];
  let buyerFilter = 'all';

  async function loadBuyers(){
    const saved = await storeGet('buyer-contacts');
    buyers = saved || [];
    renderBuyers();
  }

  function scoreOf(b){
    if (!b.checks) return 0;
    return VETTING_CHECKS.filter(c => b.checks[c.key]).length;
  }

  function followupState(b){
    if (!b.nextFollowUp) return { cls:'followup-none', text:'No follow-up set' };
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(b.nextFollowUp + 'T00:00:00');
    const diffDays = Math.round((due - today) / 86400000);
    if (diffDays < 0) return { cls:'followup-overdue', text:`Overdue ${Math.abs(diffDays)}d` };
    if (diffDays <= 3) return { cls:'followup-soon', text: diffDays===0 ? 'Due today' : `Due in ${diffDays}d` };
    return { cls:'followup-ok', text:`Follow up ${b.nextFollowUp}` };
  }

  function renderScoreDots(score){
    let dots = '';
    for (let i=0;i<6;i++) dots += `<span class="score-dot ${i<score?'filled':''}"></span>`;
    return `<span class="score-dots">${dots}</span> <span style="font-family:'Courier Prime',monospace; font-size:11px; color:var(--ink-soft);">${score}/6</span>`;
  }

  function renderBuyers(){
    const app = document.getElementById('buyersApp');
    let filtered = buyers;
    if (buyerFilter === 'active') filtered = buyers.filter(b => b.status === 'active');
    if (buyerFilter === 'followup') filtered = buyers.filter(b => {
      const f = followupState(b);
      return f.cls === 'followup-overdue' || f.cls === 'followup-soon';
    });

    // sort: overdue first, then due soon, then rest, active status bubbles up within ties
    const urgency = { 'followup-overdue':0, 'followup-soon':1, 'followup-ok':2, 'followup-none':3 };
    filtered = filtered.slice().sort((a,b) => urgency[followupState(a).cls] - urgency[followupState(b).cls]);

    let html = `<div class="deal-toolbar">
      <div class="deal-summary"><strong>${buyers.length}</strong> buyers &nbsp;·&nbsp; <strong>${buyers.filter(b=>b.status==='active').length}</strong> active</div>
      <button class="add-btn" id="addBuyerBtn" type="button">+ Add Buyer</button>
    </div>
    <div class="filter-bar">
      <button class="filter-chip ${buyerFilter==='all'?'active':''}" data-f="all" type="button">All</button>
      <button class="filter-chip ${buyerFilter==='active'?'active':''}" data-f="active" type="button">Active</button>
      <button class="filter-chip ${buyerFilter==='followup'?'active':''}" data-f="followup" type="button">Needs Follow-Up</button>
    </div>`;

    if (filtered.length === 0){
      html += `<div class="empty">${buyers.length===0 ? 'No buyers yet. Add one from your vetting calls to start tracking them.' : 'Nothing matches this filter.'}</div>`;
    } else {
      filtered.forEach(b => {
        const f = followupState(b);
        const score = scoreOf(b);
        const boxParts = [];
        if (b.priceMin || b.priceMax) boxParts.push(`$${b.priceMin||'?'}–$${b.priceMax||'?'}`);
        if (b.propertyTypes) boxParts.push(b.propertyTypes);
        if (b.areas) boxParts.push(b.areas);
        html += `<div class="deal-card" data-id="${b.id}">
          <button class="deal-x" type="button" data-id="${b.id}" title="Remove buyer" aria-label="Remove ${b.name}">✕</button>
          <div class="deal-card-top">
            <div class="deal-addr">${b.name || '(unnamed)'}${b.company ? '<br><span style="font-family:IBM Plex Sans; font-size:11px; color:var(--ink-soft);">'+b.company+'</span>' : ''}</div>
            <span class="badge badge-${b.status}">${b.status}</span>
          </div>
          <div><span class="followup-pill ${f.cls}">${f.text}</span></div>
          ${boxParts.length ? `<div class="buybox-line">${boxParts.join(' · ')}</div>` : ''}
          <div style="margin:6px 0;">${renderScoreDots(score)}</div>
          <div class="contact-links">
            ${b.phone ? `<a href="tel:${b.phone.replace(/[^\d+]/g,'')}">📞 ${b.phone}</a>` : ''}
            ${b.email ? `<a href="mailto:${b.email}">✉ ${b.email}</a>` : ''}
          </div>
          ${b.notes ? `<div class="deal-next"><b>Notes:</b> ${b.notes}</div>` : ''}
          ${b.log && b.log.length ? `<div class="log-entries">${b.log.slice(-3).reverse().map(l => `<div class="log-entry"><b>${l.date}</b> — ${l.note}</div>`).join('')}</div>` : ''}
          <div class="deal-actions">
            <button class="link-btn log-contact" type="button" data-id="${b.id}">Log Contact</button>
            <button class="link-btn edit-buyer" type="button">Edit</button>
            <button class="link-btn danger delete-buyer" type="button">Delete</button>
          </div>
        </div>`;
      });
    }
    app.innerHTML = html;

    app.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', () => { buyerFilter = btn.getAttribute('data-f'); renderBuyers(); });
    });
    document.getElementById('addBuyerBtn').addEventListener('click', () => openBuyerModal(null));
    app.querySelectorAll('.edit-buyer').forEach(btn => {
      btn.addEventListener('click', (e) => openBuyerModal(e.target.closest('.deal-card').getAttribute('data-id')));
    });
    app.querySelectorAll('.delete-buyer').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = e.target.closest('.deal-card').getAttribute('data-id');
        buyers = buyers.filter(b => b.id !== id);
        await storeSet('buyer-contacts', buyers);
        renderBuyers();
      });
    });
    app.querySelectorAll('.deal-x').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const b = buyers.find(x => x.id === id);
        if (b && !confirm(`Remove ${b.name || 'this buyer'} from your list?`)) return;
        buyers = buyers.filter(x => x.id !== id);
        await storeSet('buyer-contacts', buyers);
        renderBuyers();
      });
    });
    app.querySelectorAll('.log-contact').forEach(btn => {
      btn.addEventListener('click', () => openLogModal(btn.getAttribute('data-id')));
    });
  }

  function openLogModal(id){
    const b = buyers.find(x => x.id === id);
    if (!b) return;
    const today = new Date().toISOString().slice(0,10);
    const weekOut = new Date(Date.now() + 7*86400000).toISOString().slice(0,10);
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.id = 'logModalBackdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h3>Log Contact — ${b.name}</h3>
        <div class="field"><label>What happened? (optional)</label><textarea id="log-note" placeholder="e.g. Called, left voicemail. Or: confirmed still buying in Ashland."></textarea></div>
        <div class="field"><label>Next Follow-Up Date</label><input id="log-nextdate" type="date" value="${weekOut}" /></div>
        <div class="modal-actions">
          <button class="btn-secondary" id="cancelLogModal" type="button">Cancel</button>
          <button class="btn-primary" id="saveLogModal" type="button">Save</button>
        </div>
      </div>`;
    document.body.appendChild(backdrop);
    document.getElementById('cancelLogModal').addEventListener('click', () => backdrop.remove());
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });
    document.getElementById('saveLogModal').addEventListener('click', async () => {
      const note = document.getElementById('log-note').value.trim() || 'Contacted';
      const nextDate = document.getElementById('log-nextdate').value;
      b.log = b.log || [];
      b.log.push({ date: today, note });
      b.lastContact = today;
      if (nextDate) b.nextFollowUp = nextDate;
      await storeSet('buyer-contacts', buyers);
      backdrop.remove();
      renderBuyers();
    });
  }

  function openBuyerModal(id){
    const b = id ? buyers.find(x => x.id === id) : {
      name:'', company:'', phone:'', email:'', priceMin:'', priceMax:'',
      propertyTypes:'', areas:'', condition:'', pofStatus:'pending', assignmentPref:'unknown',
      closingDays:'', status:'secondary', nextFollowUp:'', notes:'', checks:{}, log:[]
    };
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.id = 'buyerModalBackdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h3>${id ? 'Edit Buyer' : 'Add Buyer'}</h3>
        <div class="field"><label>Name</label><input id="b-name" value="${b.name}" /></div>
        <div class="field"><label>Company</label><input id="b-company" value="${b.company||''}" /></div>
        <div class="row2">
          <div class="field"><label>Phone</label><input id="b-phone" type="tel" value="${b.phone||''}" /></div>
          <div class="field"><label>Email</label><input id="b-email" type="email" value="${b.email||''}" /></div>
        </div>
        <div class="row2">
          <div class="field"><label>Price Min</label><input id="b-pricemin" type="number" value="${b.priceMin||''}" /></div>
          <div class="field"><label>Price Max</label><input id="b-pricemax" type="number" value="${b.priceMax||''}" /></div>
        </div>
        <div class="field"><label>Property Types</label><input id="b-proptypes" placeholder="SFR, manufactured, land…" value="${b.propertyTypes||''}" /></div>
        <div class="field"><label>Areas / Zips</label><input id="b-areas" value="${b.areas||''}" /></div>
        <div class="field"><label>Condition Tolerance</label><input id="b-condition" placeholder="Full gut okay, or turnkey only" value="${b.condition||''}" /></div>
        <div class="row2">
          <div class="field">
            <label>Proof of Funds</label>
            <select id="b-pof">
              <option value="received" ${b.pofStatus==='received'?'selected':''}>Received</option>
              <option value="pending" ${b.pofStatus==='pending'?'selected':''}>Pending</option>
              <option value="none" ${b.pofStatus==='none'?'selected':''}>None</option>
            </select>
          </div>
          <div class="field">
            <label>Assignment Preference</label>
            <select id="b-assign">
              <option value="assignment" ${b.assignmentPref==='assignment'?'selected':''}>Assignment OK</option>
              <option value="doubleclose" ${b.assignmentPref==='doubleclose'?'selected':''}>Double-Close Only</option>
              <option value="unknown" ${b.assignmentPref==='unknown'?'selected':''}>Unknown</option>
            </select>
          </div>
        </div>
        <div class="field"><label>Typical Closing Speed (days)</label><input id="b-closingdays" type="number" value="${b.closingDays||''}" /></div>

        <div class="field" style="margin-top:16px;">
          <label>Vetting Checklist (from your call script)</label>
          <div class="step-list" id="b-checks">
            ${VETTING_CHECKS.map(c => `
              <div class="step-row">
                <input type="checkbox" id="chk-${c.key}" data-key="${c.key}" ${b.checks && b.checks[c.key] ? 'checked' : ''} />
                <div class="step-text"><label for="chk-${c.key}">${c.label}</label></div>
              </div>`).join('')}
          </div>
          <div id="scoreHint" style="font-size:11px; color:var(--ink-soft); margin-top:4px;"></div>
        </div>

        <div class="field">
          <label>Status</label>
          <select id="b-status">
            <option value="active" ${b.status==='active'?'selected':''}>Active</option>
            <option value="secondary" ${b.status==='secondary'?'selected':''}>Secondary</option>
            <option value="cold" ${b.status==='cold'?'selected':''}>Cold</option>
          </select>
        </div>
        <div class="field"><label>Next Follow-Up Date</label><input id="b-nextfollowup" type="date" value="${b.nextFollowUp||''}" /></div>
        <div class="field"><label>Notes</label><textarea id="b-notes">${b.notes||''}</textarea></div>
        <div class="modal-actions">
          <button class="btn-secondary" id="cancelBuyerModal" type="button">Cancel</button>
          <button class="btn-primary" id="saveBuyerModal" type="button">${id ? 'Save Changes' : 'Add Buyer'}</button>
        </div>
      </div>`;
    document.body.appendChild(backdrop);

    function updateScoreHint(){
      const checked = VETTING_CHECKS.filter(c => document.getElementById('chk-'+c.key).checked).length;
      const hint = document.getElementById('scoreHint');
      hint.textContent = `Score: ${checked}/6 — ` + (checked >= 5 ? 'suggests Active list' : checked <= 2 ? 'suggests Secondary/Cold list' : 'borderline, your call');
    }
    VETTING_CHECKS.forEach(c => document.getElementById('chk-'+c.key).addEventListener('change', updateScoreHint));
    updateScoreHint();

    document.getElementById('cancelBuyerModal').addEventListener('click', () => backdrop.remove());
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });
    document.getElementById('saveBuyerModal').addEventListener('click', async () => {
      const name = document.getElementById('b-name').value.trim();
      if (!name){ document.getElementById('b-name').focus(); return; }
      const checks = {};
      VETTING_CHECKS.forEach(c => { checks[c.key] = document.getElementById('chk-'+c.key).checked; });
      const payload = {
        id: id || ('b' + Date.now()),
        name,
        company: document.getElementById('b-company').value.trim(),
        phone: document.getElementById('b-phone').value.trim(),
        email: document.getElementById('b-email').value.trim(),
        priceMin: document.getElementById('b-pricemin').value,
        priceMax: document.getElementById('b-pricemax').value,
        propertyTypes: document.getElementById('b-proptypes').value.trim(),
        areas: document.getElementById('b-areas').value.trim(),
        condition: document.getElementById('b-condition').value.trim(),
        pofStatus: document.getElementById('b-pof').value,
        assignmentPref: document.getElementById('b-assign').value,
        closingDays: document.getElementById('b-closingdays').value,
        checks,
        status: document.getElementById('b-status').value,
        nextFollowUp: document.getElementById('b-nextfollowup').value,
        notes: document.getElementById('b-notes').value.trim(),
        log: b.log || [],
        lastContact: b.lastContact || '',
      };
      if (id){
        buyers = buyers.map(x => x.id === id ? payload : x);
      } else {
        buyers.push(payload);
      }
      await storeSet('buyer-contacts', buyers);
      backdrop.remove();
      renderBuyers();
    });
  }

  const tabLogBtn = document.getElementById('tabLogBtn');
  const tabDealsBtn = document.getElementById('tabDealsBtn');
  const tabDocketBtn = document.getElementById('tabDocketBtn');
  const tabBuyersBtn = document.getElementById('tabBuyersBtn');
  const appEl = document.getElementById('app');
  const dealAppEl = document.getElementById('dealApp');
  const docketAppEl = document.getElementById('docketApp');
  const buyersAppEl = document.getElementById('buyersApp');

  function showTab(which){
    tabLogBtn.classList.toggle('active', which==='log');
    tabDealsBtn.classList.toggle('active', which==='deals');
    tabDocketBtn.classList.toggle('active', which==='docket');
    tabBuyersBtn.classList.toggle('active', which==='buyers');
    tabLogBtn.setAttribute('aria-selected', which==='log');
    tabDealsBtn.setAttribute('aria-selected', which==='deals');
    tabDocketBtn.setAttribute('aria-selected', which==='docket');
    tabBuyersBtn.setAttribute('aria-selected', which==='buyers');
    appEl.style.display = which==='log' ? '' : 'none';
    dealAppEl.style.display = which==='deals' ? '' : 'none';
    docketAppEl.style.display = which==='docket' ? '' : 'none';
    buyersAppEl.style.display = which==='buyers' ? '' : 'none';
  }

  tabLogBtn.addEventListener('click', () => showTab('log'));
  tabDealsBtn.addEventListener('click', () => showTab('deals'));
  tabDocketBtn.addEventListener('click', () => showTab('docket'));
  tabBuyersBtn.addEventListener('click', () => showTab('buyers'));

  loadLogState();
  loadDeals();
  loadDocket();
  loadBuyers();
})();
</script>
</body>
</html>
